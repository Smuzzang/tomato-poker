<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>토마토 포커 — Tomato Poker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23e23b2e'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/style.css?v=13" />
</head>
<body>
<div id="app">

  <!-- ===== 로비 ===== -->
  <section id="lobby" class="lobby">
    <div class="lobby-wrap">
      <div class="lobby-card">
        <div class="brand"><h1>토마토 포커</h1><p class="tagline">Tomato Poker · 2인 헤즈업</p></div>

        <label class="field"><span>닉네임</span>
          <input id="nickname" type="text" maxlength="8" placeholder="이름을 입력하세요" /></label>

        <div class="seg"><span class="seg-label">게임</span>
          <div class="seg-btns" id="gameSeg">
            <button data-game="holdem" class="on">텍사스 홀덤</button>
            <button data-game="seven">세븐포커</button>
          </div>
        </div>

        <div class="seg"><span class="seg-label">인원</span>
          <div class="seg-btns" id="seatSeg">
            <button data-seats="2">2인</button>
            <button data-seats="4">4인</button>
            <button data-seats="6" class="on">6인</button>
          </div>
        </div>

        <div class="seg"><span class="seg-label">난이도</span>
          <div class="seg-btns" id="diffSeg">
            <button data-diff="easy">쉬움</button>
            <button data-diff="normal" class="on">보통</button>
            <button data-diff="hard">어려움</button>
          </div>
        </div>

        <button id="btnSingle" class="primary big">혼자 하기 (vs AI)</button>
        <div class="divider"><span>온라인 대전</span></div>
        <button id="btnHost" class="ghost">방 만들기</button>
        <button id="btnHelp" class="link">규칙 보기</button>
        <div id="help" class="help" hidden></div>
      </div>

      <div class="rooms-panel">
        <div class="pr-head">열린 방 <span id="prCount"></span></div>
        <div id="prList" class="pr-list"><div class="pr-empty">온라인 대전은 곧 업데이트됩니다</div></div>
      </div>
    </div>
    <p class="credit">Tomato Arcade</p>
  </section>

  <!-- ===== 포커 테이블 (N인 라운드) ===== -->
  <section id="table" class="table" hidden>
    <button id="leaveBtn" class="leave-btn" title="나가기">🚪</button>
    <div class="dealer">
      <div class="dealer-av" aria-label="딜러">
        <svg viewBox="0 0 100 100" width="100%" height="100%">
          <defs><clipPath id="dc"><circle cx="50" cy="50" r="49"/></clipPath></defs>
          <g clip-path="url(#dc)">
            <rect width="100" height="100" fill="#243244"/>
            <path d="M16 100 V88 Q50 70 84 88 V100Z" fill="#15151b"/>
            <path d="M40 84 L50 98 L60 84 L55 78 H45Z" fill="#fff"/>
            <path d="M43 86 L50 91 L57 86 L50 82Z" fill="#e23b2e"/>
            <rect x="44" y="68" width="12" height="18" fill="#eabf95"/>
            <ellipse cx="50" cy="45" rx="27" ry="29" fill="#2a1a14"/>
            <ellipse cx="50" cy="48" rx="18.5" ry="22" fill="#f3c79c"/>
            <path d="M31 41 Q50 19 69 41 Q67 28 50 26 Q33 28 31 41Z" fill="#2a1a14"/>
            <path d="M29 43 Q26 62 35 73 Q29 52 35 41Z" fill="#2a1a14"/>
            <path d="M71 43 Q74 62 65 73 Q71 52 65 41Z" fill="#2a1a14"/>
            <ellipse cx="42.5" cy="49" rx="2.5" ry="3.1" fill="#3a2a24"/>
            <ellipse cx="57.5" cy="49" rx="2.5" ry="3.1" fill="#3a2a24"/>
            <path d="M38 43 Q42.5 41 47 43" stroke="#3a2a24" stroke-width="1.2" fill="none"/>
            <path d="M53 43 Q57.5 41 62 43" stroke="#3a2a24" stroke-width="1.2" fill="none"/>
            <path d="M45 59 Q50 63 55 59" stroke="#c0392b" stroke-width="1.7" fill="none" stroke-linecap="round"/>
            <circle cx="39" cy="55" r="2.6" fill="#f0a080" opacity=".45"/>
            <circle cx="61" cy="55" r="2.6" fill="#f0a080" opacity=".45"/>
          </g>
          <circle cx="50" cy="50" r="48" fill="none" stroke="#e8b04a" stroke-width="3"/>
        </svg>
      </div>
      <div class="deck" id="deck"><img src="cards/back.png" alt="덱" /></div>
    </div>
    <div class="felt">
      <div class="felt-inner" id="feltInner">
        <div class="center-area">
          <div class="pot-pill"><span class="pot-ic">🪙</span> <span id="potAmt">0</span></div>
          <div class="community" id="community"></div>
          <div class="board-msg" id="boardMsg"></div>
        </div>
        <div class="seats" id="seats"></div>
      </div>
    </div>
    <div class="hero-cards" id="heroCards"></div>

    <!-- 액션 컨트롤 -->
    <div class="actions" id="actions" hidden>
      <button class="act fold" id="btnFold">폴드</button>
      <button class="act call" id="btnCall">체크</button>
      <button class="act raise" id="btnRaise">레이즈</button>
      <div class="raise-panel" id="raisePanel" hidden>
        <input type="range" id="raiseSlider" />
        <div class="raise-row">
          <button class="rq" data-q="0.5">½팟</button>
          <button class="rq" data-q="1">팟</button>
          <button class="rq" data-q="allin">올인</button>
          <span class="raise-amt" id="raiseAmt">0</span>
        </div>
        <div class="raise-confirm">
          <button class="act raise" id="btnRaiseDo">레이즈</button>
          <button class="act fold" id="btnRaiseCancel">취소</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 모달 -->
  <div id="modal" class="modal" hidden><div class="modal-box" id="modalBox"></div></div>
  <div id="toasts" class="toasts"></div>
</div>

<script src="js/cards.js?v=13"></script>
<script src="js/evaluator.js?v=13"></script>
<script src="js/holdemN.js?v=13"></script>
<script src="js/seven.js?v=13"></script>
<script src="js/ai.js?v=13"></script>
<script src="js/main.js?v=13"></script>
</body>
</html>
